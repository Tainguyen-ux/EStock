name: Deploy EStock API

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/nhox9xy/estock-api
            
            # Print current status
            echo "=== Diagnostic Info ==="
            git status
            git log -n 2

            # Pull latest code
            git pull origin main

            # Install/update dependencies
            source venv/bin/activate
            pip install -r requirements.txt --quiet

            # Kill uvicorn processes (systemd will automatically restart the service in 5s due to Restart=always)
            echo "=== Restarting uvicorn by killing processes ==="
            killall uvicorn || pkill -f uvicorn || true
            
            # Wait for systemd to restart the service (RestartSec=5)
            echo "=== Waiting 7s for auto-restart ==="
            sleep 7
            
            # Verify service state
            echo "=== Service Status ==="
            systemctl status estock-api --no-pager || true
            
            # Check if port 8000 is open and what process is using it
            echo "=== Port 8000 Owner ==="
            lsof -i :8000 || netstat -an | grep 8000 || true

            echo "✅ Deploy completed at $(date)"

