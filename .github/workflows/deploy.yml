name: Deploy EStock API

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/nhox9xy/estock-api
            
            # Print current status
            echo "=== Diagnostic Info ==="
            git status
            git log -n 2

            # Pull latest code
            git pull origin main

            # Install/update dependencies
            source venv/bin/activate
            pip install -r requirements.txt --quiet

            # Check for stray uvicorn processes and kill them if they are not running under systemd
            echo "=== Checking for stray uvicorn processes ==="
            ps aux | grep uvicorn || true
            sudo killall uvicorn || true
            
            # Restart service
            echo "=== Restarting service ==="
            sudo systemctl restart estock-api
            
            # Verify service state
            echo "=== Service Status ==="
            sudo systemctl status estock-api --no-pager
            
            # Check if port 8000 is open and what process is using it
            echo "=== Port 8000 Owner ==="
            sudo lsof -i :8000 || sudo netstat -tulpn | grep 8000 || true

            echo "✅ Deploy completed at $(date)"

