name: Deploy EStock API

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files and deploy
        run: |
          # Sync checked out code to app directory (excluding venv and git files)
          rsync -ar --exclude='venv' --exclude='.git' --exclude='.github' ./ /home/sshuser/estock-api/
          
          cd /home/sshuser/estock-api
          
          # Activate virtual environment and install requirements
          source venv/bin/activate
          pip install -r requirements.txt --quiet
          
          # Restart systemd service
          sudo systemctl restart estock-api
          sudo systemctl status estock-api --no-pager

